<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微信转账对账助手 - 高保真交互原型</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f6fa; color: #2d3436; }
  .container { max-width: 960px; margin: 0 auto; padding: 20px; }
  .header { text-align: center; padding: 40px 20px 30px; }
  .header h1 { font-size: 28px; font-weight: 700; color: #2d3436; margin-bottom: 8px; }
  .header p { color: #636e72; font-size: 15px; }
  .header .badge { display: inline-block; margin-top: 10px; padding: 4px 14px; background: #dfe6e9; border-radius: 12px; font-size: 12px; color: #636e72; }
  .upload-area { background: #fff; border: 2px dashed #b2bec3; border-radius: 16px; padding: 40px; text-align: center; cursor: pointer; transition: all .3s; margin-bottom: 24px; }
  .upload-area:hover { border-color: #6c5ce7; background: #f8f7ff; }
  .upload-area .icon { font-size: 40px; margin-bottom: 12px; }
  .upload-area .text { font-size: 16px; color: #2d3436; font-weight: 500; }
  .upload-area .sub { font-size: 13px; color: #636e72; margin-top: 6px; }
  .upload-area .hint { font-size: 12px; color: #b2bec3; margin-top: 12px; }
  .demo-banner { background: #ffeaa7; color: #2d3436; border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .demo-banner strong { font-weight: 600; }
  .tabs { display: flex; gap: 0; margin-bottom: 0; background: #fff; border-radius: 12px 12px 0 0; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .tabs button { flex: 1; padding: 14px 20px; border: none; background: #fff; font-size: 15px; font-weight: 500; cursor: pointer; transition: all .3s; border-bottom: 3px solid transparent; color: #636e72; }
  .tabs button.active { color: #6c5ce7; border-bottom-color: #6c5ce7; background: #f8f7ff; }
  .tabs button:hover:not(.active) { background: #f5f6fa; }
  .tab-content { background: #fff; border-radius: 0 0 12px 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.06); margin-bottom: 20px; display: none; }
  .tab-content.active { display: block; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { background: #f8f9fa; padding: 12px 14px; text-align: left; font-weight: 600; color: #2d3436; border-bottom: 2px solid #dfe6e9; font-size: 13px; }
  td { padding: 12px 14px; border-bottom: 1px solid #f0f0f0; }
  tr:hover td { background: #f8f7ff; }
  .tag { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: 500; }
  .tag-in { background: #dfe6e9; color: #00b894; background: #e8f8f5; }
  .tag-out { background: #fce4ec; color: #e17055; }
  .amount { font-weight: 600; font-variant-numeric: tabular-nums; }
  .editable { cursor: text; }
  .editable:hover { background: #fffde7; }
  .actions { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .btn { padding: 10px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all .3s; }
  .btn-primary { background: #6c5ce7; color: #fff; }
  .btn-primary:hover { background: #5a4bd1; }
  .btn-secondary { background: #dfe6e9; color: #2d3436; }
  .btn-secondary:hover { background: #b2bec3; }
  .btn-success { background: #00b894; color: #fff; }
  .btn-success:hover { background: #00a381; }
  .stats { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-card { background: #fff; border-radius: 12px; padding: 16px 20px; flex: 1; min-width: 140px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .stat-card .num { font-size: 26px; font-weight: 700; color: #2d3436; }
  .stat-card .label { font-size: 13px; color: #636e72; margin-top: 4px; }
  .stat-card .num.green { color: #00b894; }
  .stat-card .num.red { color: #e17055; }
  .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,.4); z-index: 1000; justify-content: center; align-items: center; }
  .modal-overlay.active { display: flex; }
  .modal { background: #fff; border-radius: 16px; padding: 24px; max-width: 400px; width: 90%; box-shadow: 0 10px 40px rgba(0,0,0,.2); }
  .modal h3 { margin-bottom: 16px; }
  .modal .form-group { margin-bottom: 12px; }
  .modal .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; color: #636e72; }
  .modal .form-group input, .modal .form-group select { width: 100%; padding: 8px 12px; border: 1px solid #dfe6e9; border-radius: 8px; font-size: 14px; }
  .modal .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #2d3436; color: #fff; padding: 12px 24px; border-radius: 10px; font-size: 14px; z-index: 2000; opacity: 0; transition: opacity .4s; pointer-events: none; }
  .toast.show { opacity: 1; }
  @media (max-width: 640px) { .header h1 { font-size: 22px; } .stats { flex-direction: column; } .actions { flex-direction: column; } .btn { width: 100%; text-align: center; } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📊 微信转账对账助手</h1>
    <p>上传聊天截图 → 自动识别入金/出金 → 导出 Excel</p>
    <div class="badge">高保真交互原型（演示数据为示例）</div>
  </div>

  <div class="upload-area" id="uploadArea" onclick="simulateUpload()">
    <div class="icon">📁</div>
    <div class="text">点击上传聊天截图</div>
    <div class="sub">支持 PNG、JPG 格式</div>
    <div class="hint">已模拟上传示例数据，点此重新加载</div>
  </div>

  <div class="demo-banner">💡 <strong>演示模式</strong> — 以下数据为模拟的识别结果，用于展示产品功能和交互流程。</div>

  <div class="stats">
    <div class="stat-card"><div class="num green" id="totalInAmount">¥3,680</div><div class="label">入金总计</div></div>
    <div class="stat-card"><div class="num red" id="totalOutAmount">¥1,260</div><div class="label">出金总计</div></div>
    <div class="stat-card"><div class="num" id="totalCount">8</div><div class="label">总记录数</div></div>
    <div class="stat-card"><div class="num" id="dedupCount">0</div><div class="label">去重过滤</div></div>
  </div>

  <div class="tabs">
    <button class="active" onclick="switchTab('in')">📥 入金表</button>
    <button onclick="switchTab('out')">📤 出金表</button>
  </div>

  <div class="tab-content active" id="tab-in">
    <div class="actions">
      <button class="btn btn-secondary" onclick="addRow('in')">＋ 手动添加</button>
      <button class="btn btn-success" onclick="exportExcel()">📥 导出 Excel</button>
    </div>
    <table><thead><tr><th>时间</th><th>交易方</th><th>金额</th><th>备注</th><th>操作</th></tr></thead><tbody id="inTableBody"></tbody></table>
  </div>

  <div class="tab-content" id="tab-out">
    <div class="actions">
      <button class="btn btn-secondary" onclick="addRow('out')">＋ 手动添加</button>
      <button class="btn btn-success" onclick="exportExcel()">📥 导出 Excel</button>
    </div>
    <table><thead><tr><th>时间</th><th>交易方</th><th>金额</th><th>备注</th><th>操作</th></tr></thead><tbody id="outTableBody"></tbody></table>
  </div>

  <div style="text-align:center;padding:10px 0 30px;color:#b2bec3;font-size:12px;">高保真交互原型 · 演示数据为示例 · 双击单元格可编辑</div>
</div>

<div class="modal-overlay" id="editModal"><div class="modal">
  <h3 id="modalTitle">编辑记录</h3>
  <div class="form-group"><label>时间</label><input type="text" id="editTime"></div>
  <div class="form-group"><label>交易方</label><input type="text" id="editParty"></div>
  <div class="form-group"><label>方向</label><select id="editDirection"><option value="入金">入金</option><option value="出金">出金</option></select></div>
  <div class="form-group"><label>金额 (¥)</label><input type="text" id="editAmount"></div>
  <div class="form-group"><label>备注</label><input type="text" id="editNote"></div>
  <div class="form-actions"><button class="btn btn-secondary" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveEdit()">保存</button></div>
</div></div>

<div class="toast" id="toast"></div>

<script>
  let data = { in: [], out: [] };
  let editId = null;
  let editType = null;

  function loadDemoData() {
    data = {
      in: [
        { id: 'i1', time: '2026-06-01 14:30', party: '张三', amount: 200, note: '货款' },
        { id: 'i2', time: '2026-06-03 09:15', party: '李四', amount: 580, note: '' },
        { id: 'i3', time: '2026-06-08 20:00', party: '王五', amount: 1200, note: '房租' },
        { id: 'i4', time: '2026-06-15 11:45', party: '赵六', amount: 800, note: '' },
        { id: 'i5', time: '2026-06-22 16:30', party: '陈七', amount: 900, note: '项目款' }
      ],
      out: [
        { id: 'o1', time: '2026-06-05 10:00', party: '供应商A', amount: 450, note: '物料采购' },
        { id: 'o2', time: '2026-06-12 15:20', party: '快递公司', amount: 360, note: '运费' },
        { id: 'o3', time: '2026-06-20 08:50', party: '物业', amount: 450, note: '电费' }
      ]
    };
    renderAll();
    showToast('✅ 已识别 8 条转账记录（入金 5 条 / 出金 3 条），0 条重复已过滤');
  }

  function renderTable(type) {
    const tbody = document.getElementById(type === 'in' ? 'inTableBody' : 'outTableBody');
    const items = data[type];
    tbody.innerHTML = items.map(item => `
      <tr>
        <td class="editable" onclick="editRow('${type}','${item.id}')">${item.time}</td>
        <td class="editable" onclick="editRow('${type}','${item.id}')">${item.party}</td>
        <td class="editable amount" onclick="editRow('${type}','${item.id}')">¥${item.amount.toFixed(2)}</td>
        <td class="editable" onclick="editRow('${type}','${item.id}')">${item.note || '-'}</td>
        <td><button class="btn btn-secondary" style="padding:4px 12px;font-size:12px;" onclick="editRow('${type}','${item.id}')">✏️</button> <button class="btn btn-secondary" style="padding:4px 12px;font-size:12px;background:#fce4ec;color:#e17055;" onclick="deleteRow('${type}','${item.id}')">🗑</button></td>
      </tr>
    `).join('');
    updateStats();
  }

  function renderAll() { renderTable('in'); renderTable('out'); }

  function updateStats() {
    const inTotal = data.in.reduce((s, r) => s + r.amount, 0);
    const outTotal = data.out.reduce((s, r) => s + r.amount, 0);
    document.getElementById('totalInAmount').textContent = '¥' + inTotal.toLocaleString();
    document.getElementById('totalOutAmount').textContent = '¥' + outTotal.toLocaleString();
    document.getElementById('totalCount').textContent = data.in.length + data.out.length;
  }

  function switchTab(tab) {
    document.querySelectorAll('.tabs button').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='in')||(i===1&&tab==='out')));
    document.getElementById('tab-in').classList.toggle('active', tab === 'in');
    document.getElementById('tab-out').classList.toggle('active', tab === 'out');
  }

  function editRow(type, id) {
    const item = data[type].find(r => r.id === id);
    if (!item) return;
    editType = type; editId = id;
    document.getElementById('editTime').value = item.time;
    document.getElementById('editParty').value = item.party;
    document.getElementById('editDirection').value = type === 'in' ? '入金' : '出金';
    document.getElementById('editAmount').value = item.amount;
    document.getElementById('editNote').value = item.note || '';
    document.getElementById('modalTitle').textContent = '编辑记录';
    document.getElementById('editModal').classList.add('active');
  }

  function addRow(type) {
    editType = type; editId = null;
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    document.getElementById('editTime').value = now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate()) + ' ' + pad(now.getHours()) + ':' + pad(now.getMinutes());
    document.getElementById('editParty').value = '';
    document.getElementById('editDirection').value = type === 'in' ? '入金' : '出金';
    document.getElementById('editAmount').value = '';
    document.getElementById('editNote').value = '';
    document.getElementById('modalTitle').textContent = '手动添加记录';
    document.getElementById('editModal').classList.add('active');
  }

  function saveEdit() {
    const time = document.getElementById('editTime').value.trim();
    const party = document.getElementById('editParty').value.trim();
    const dir = document.getElementById('editDirection').value;
    const amount = parseFloat(document.getElementById('editAmount').value);
    const note = document.getElementById('editNote').value.trim();
    if (!time || !party || isNaN(amount)) { showToast('⚠️ 请填写完整信息（时间、交易方、金额）'); return; }
    const type = dir === '入金' ? 'in' : 'out';
    if (editId) {
      const item = data[editType].find(r => r.id === editId);
      if (item) { item.time = time; item.party = party; item.amount = amount; item.note = note; }
      if (editType !== type) {
        data[editType] = data[editType].filter(r => r.id !== editId);
        data[type].push({ id: editId, time, party, amount, note });
      }
      showToast('✅ 已保存');
    } else {
      const newId = type + '-' + Date.now();
      data[type].push({ id: newId, time, party, amount, note });
      showToast('✅ 已添加');
    }
    closeModal();
    renderAll();
  }

  function deleteRow(type, id) {
    if (!confirm('确定删除这条记录吗？')) return;
    data[type] = data[type].filter(r => r.id !== id);
    renderAll();
    showToast('🗑 已删除');
  }

  function closeModal() { document.getElementById('editModal').classList.remove('active'); editId = null; }

  function exportExcel() {
    showToast('📥 已导出 Excel 文件（入金 ' + data.in.length + ' 条 / 出金 ' + data.out.length + ' 条）');
  }

  function simulateUpload() {
    const btn = document.getElementById('uploadArea');
    btn.innerHTML = '<div class="icon" style="font-size:30px;">⏳</div><div class="text">正在识别...</div><div class="sub">调用百度云 OCR 解析截图</div>';
    btn.style.borderColor = '#6c5ce7';
    setTimeout(() => {
      loadDemoData();
      btn.innerHTML = '<div class="icon" style="font-size:30px;">✅</div><div class="text">识别完成</div><div class="sub">上次识别：' + new Date().toLocaleString() + '</div><div class="hint">点此重新上传截图</div>';
      btn.style.borderColor = '#00b894';
    }, 1500);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  loadDemoData();
</script>
</body>
</html>
